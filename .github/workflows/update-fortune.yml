name: Update Weekly Fortune

on:
  schedule:
    # 每周三北京时间8:00运行（UTC 0:00）
    - cron: '0 0 * * 3'
  workflow_dispatch: # 手动触发

jobs:
  update-fortune:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4
      
      - name: Fetch latest fortune
        run: |
          python3 scripts/fetch_fortune.py
      
      - name: Check for changes
        id: check_changes
        run: |
          git diff --exit-code data/weekly-fortune.json || echo "changed=true" >> $GITHUB_OUTPUT
      
      - name: Commit and push if changed
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/weekly-fortune.json
          git commit -m "自动更新本周运势数据 ($(date '+%Y-%m-%d'))"
          git push
